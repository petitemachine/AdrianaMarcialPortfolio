<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>The Elf — DVD Interactive | Adriana Marcial</title>
	<link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&display=swap" rel="stylesheet">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { background: #000; display: flex; justify-content: center; }

		.screen {
			display: none;
			width: 1000px;
			position: relative;
		}
		.screen.active { display: block; }
		.screen > .bg {
			width: 100%;
			display: block;
		}

		/* Red button — top right corner on intro screen */
		.btn-red {
			position: absolute;
			top: 16px;
			right: 16px;
			width: 120px;
			cursor: pointer;
			transition: transform 0.1s;
		}
		.btn-red:hover { transform: scale(1.1); }

		/* Menu grid — right side only (Elf figure is on the left) */
		.video-grid {
			position: absolute;
			top: 0; left: 0; right: 0; bottom: 0;
			display: flex;
			flex-direction: column;
			justify-content: center;
			gap: 14px;
			padding: 30px 20px 30px 38%;
		}
		.video-row {
			display: flex;
			gap: 10px;
			justify-content: center;
		}
		.video-row .video-thumb {
			flex: 1;
		}

		.video-thumb {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 6px;
			cursor: pointer;
		}
		.video-thumb img.thumb {
			width: 100%;
			object-fit: cover;
			border: 2px solid transparent;
			transition: border-color 0.2s;
		}
		.video-thumb:hover img.thumb {
			border-color: #4caf50;
		}
		.video-thumb .clip-title {
			color: white;
			font-family: 'Mountains of Christmas', cursive;
			font-size: 15px;
			font-weight: 700;
			text-align: center;
			margin-top: 4px;
			text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
		}

		/* Video screen — centered in right portion, Elf on left */
		#screen-video .video-wrap {
			position: absolute;
			top: 50%;
			right: 2%;
			width: 62%;
			transform: translateY(-50%);
		}
		#screen-video video {
			width: 100%;
			display: block;
		}
		.back-btn {
			position: absolute;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 4px;
			cursor: pointer;
		}
		#video-title-bar {
			background: rgba(0,0,0,0.55);
			color: white;
			font-family: 'Mountains of Christmas', cursive;
			font-size: 22px;
			font-weight: 700;
			text-align: center;
			padding: 8px 16px;
			letter-spacing: 1px;
		}
		.back-btn img { width: 48px; }
		.back-btn span {
			color: white;
			font-family: Arial, sans-serif;
			font-size: 13px;
			font-weight: 700;
			letter-spacing: 2px;
		}
		.back-btn:hover img { transform: scale(1.1); }

		/* Floating controls group — top-left inside each screen */
		.ctrl-group {
			position: absolute;
			top: 14px;
			left: 14px;
			display: flex;
			gap: 10px;
			align-items: center;
			z-index: 10;
		}
		.ctrl-home, .ctrl-sound {
			cursor: pointer;
			text-decoration: none;
			opacity: 0.85;
			transition: transform 0.15s, opacity 0.15s;
			background: none;
			border: none;
			padding: 0;
		}
		.ctrl-home:hover, .ctrl-sound:hover {
			transform: scale(1.15);
			opacity: 1;
		}
		.ctrl-home svg, .ctrl-sound svg {
			width: 28px;
			height: 28px;
			fill: white;
			filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
		}
	</style>
</head>
<body>

	<!-- SCREEN 1: Intro -->
	<div id="screen-main" class="screen active">
		<img class="bg" src="images/Thefinalelf/elfmultimedia.jpg" alt="The Elf DVD Interactive">
		<img class="btn-red" src="images/Thefinalelf/BUTTON 1.png" alt="Go to menu" onclick="goToMenu()">
		<div class="ctrl-group">
			<a href="portofolio.html" class="ctrl-home" title="Back to Portfolio">
				<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
			</a>
			<button class="ctrl-sound" onclick="toggleMusic()" title="Toggle music">
				<svg id="icon-sound-1" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
			</button>
		</div>
		<audio id="bg-music" src="images/Thefinalelf/Pennies From Heaven (Remastered).mp3" loop></audio>
	</div>

	<!-- SCREEN 2: Menu -->
	<div id="screen-menu" class="screen">
		<img class="bg" src="images/Thefinalelf/elfvideobackground.jpg" alt="Select a clip">
		<div class="ctrl-group">
			<a href="portofolio.html" class="ctrl-home" title="Back to Portfolio">
				<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
			</a>
			<button class="ctrl-sound" onclick="toggleMusic()" title="Toggle music">
				<svg id="icon-sound-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
			</button>
		</div>
		<div class="video-grid">
			<!-- Row 1: clips 1-5 -->
			<div class="video-row">
				<div class="video-thumb" onclick="playVideo(1)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL1THEELF.png" alt="Clip 1">
					<span class="clip-title">Elf School Lesson</span>
				</div>
				<div class="video-thumb" onclick="playVideo(2)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL2THEELF.png" alt="Clip 2">
					<span class="clip-title">The Raccoon Hug</span>
				</div>
				<div class="video-thumb" onclick="playVideo(3)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL3THEELF.png" alt="Clip 3">
					<span class="clip-title">The Revolving Door</span>
				</div>
				<div class="video-thumb" onclick="playVideo(4)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL4THEELF.png" alt="Clip 4">
					<span class="clip-title">The Perfume</span>
				</div>
				<div class="video-thumb" onclick="playVideo(5)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL5THEELF.png" alt="Clip 5">
					<span class="clip-title">SANTA!!!</span>
				</div>
			</div>
			<!-- Row 2: clips 6-10 -->
			<div class="video-row">
				<div class="video-thumb" onclick="playVideo(6)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL6THEELF.png" alt="Clip 6">
					<span class="clip-title">Mall Singer vs. Manager</span>
				</div>
				<div class="video-thumb" onclick="playVideo(7)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL7THEELF.png" alt="Clip 7">
					<span class="clip-title">Bathroom Singer</span>
				</div>
				<div class="video-thumb" onclick="playVideo(8)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL8THEELF.png" alt="Clip 8">
					<span class="clip-title">Meeting Santa</span>
				</div>
				<div class="video-thumb" onclick="playVideo(9)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL9THEELF.png" alt="Clip 9">
					<span class="clip-title">Working with Convicts</span>
				</div>
				<div class="video-thumb" onclick="playVideo(10)">
					<img class="thumb" src="images/Thefinalelf/VIDEOS/THUMBNAIL10THEELF.png" alt="Clip 10">
					<span class="clip-title">The Dance</span>
				</div>
			</div>
		</div>
	</div>

	<!-- SCREEN 3: Video player -->
	<div id="screen-video" class="screen">
		<img class="bg" src="images/Thefinalelf/elfvideobackground.jpg" alt="Now playing">
		<div class="ctrl-group">
			<a href="portofolio.html" class="ctrl-home" title="Back to Portfolio">
				<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
			</a>
			<button class="ctrl-sound" onclick="toggleMusic()" title="Toggle music">
				<svg id="icon-sound-3" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
			</button>
		</div>
		<div class="video-wrap">
			<div id="video-title-bar"></div>
			<video id="player" controls></video>
		</div>
		<div class="back-btn" onclick="goToMenu()">
			<img src="images/Thefinalelf/BUTTON 6.png" alt="Back">
			<span>BACK</span>
		</div>
	</div>

	<script>
		const videos = [
			'images/Thefinalelf/VIDEOS/ELFVIDEO1.mp4',
			'images/Thefinalelf/VIDEOS/THEELFVIDEO2.mp4',
			'images/Thefinalelf/VIDEOS/ELFVIDEO3.mp4',
			'images/Thefinalelf/VIDEOS/ELFVIDEO4.mp4',
			'images/Thefinalelf/VIDEOS/ELFVIDEO5.mp4',
			'images/Thefinalelf/VIDEOS/ELFVIDEO6.mp4',
			'images/Thefinalelf/VIDEOS/ELFVIDEO7.mp4',
			'images/Thefinalelf/VIDEOS/ELFVIDEO8.mp4',
			'images/Thefinalelf/VIDEOS/ELFVIDEO9.mp4',
			'images/Thefinalelf/VIDEOS/ELFVIDEO10.mp4',
		];

		const titles = [
			'Elf School Lesson',
			'The Raccoon Hug',
			'The Revolving Door',
			'The Perfume',
			'SANTA!!!',
			'Mall Singer vs. Manager',
			'Bathroom Singer',
			'Meeting Santa',
			'Working with Convicts',
			'The Dance',
		];

		const music = document.getElementById('bg-music');
		const player = document.getElementById('player');

		function showScreen(id) {
			document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
			document.getElementById(id).classList.add('active');
		}

		function goToMenu() {
			player.pause();
			player.src = '';
			music.play().catch(() => {});
			showScreen('screen-menu');
		}

		function playVideo(num) {
			music.pause();
			player.src = videos[num - 1];
			document.getElementById('video-title-bar').textContent = titles[num - 1];
			showScreen('screen-video');
			player.play().catch(() => {});
		}

		const soundOn  = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
		const soundOff = 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z';

		let musicMuted = false;
		function toggleMusic() {
			musicMuted = !musicMuted;
			music.muted = musicMuted;
			document.querySelectorAll('.ctrl-sound svg path').forEach(p => {
				p.setAttribute('d', musicMuted ? soundOff : soundOn);
			});
		}

		document.querySelector('.btn-red').addEventListener('click', function() {
			music.play().catch(() => {});
			goToMenu();
		});
	</script>

</body>
</html>
